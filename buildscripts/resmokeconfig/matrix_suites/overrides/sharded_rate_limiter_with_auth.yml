### Overrides for rate-limited sharded cluster suites with authentication ###
###
### These overrides add authentication to sharded rate-limiter suites.
###
### IMPORTANT: Don't override 'eval' in shell_options - use the 'eval:' key
### in the mapping file instead, which appends rather than replaces.
###

# Anchors for reuse - stored in a dummy entry that resmoke ignores
- name: _anchors_do_not_use
  value:
    keyFile: &keyFile jstests/libs/authTestsKey
    keyFileData: &keyFileData Thiskeyisonlyforrunningthesuitewithauthenticationdontuseitinanytestsdirectly

    authOptions: &authOptions
      authenticationDatabase: admin
      authenticationMechanism: SCRAM-SHA-256
      password: *keyFileData
      username: __system

    authTestData: &authTestData
      auth: true
      authMechanism: SCRAM-SHA-256
      keyFile: *keyFile
      keyFileData: *keyFileData
      roleGraphInvalidationIsFatal: true

    hookShellOpts: &hookShellOpts
      <<: *authOptions
      eval: jsTest.authenticate(db.getMongo())
      global_vars:
        TestData: *authTestData

    cleanEveryNHook: &cleanEveryNHook
      class: CleanEveryN
      n: 20
      shell_options: *authOptions

    rateLimiterParams: &rateLimiterParams
      defaultClientMaxRetryAttempts: 16
      defaultClientBaseBackoffMillis: 10
      defaultClientMaxBackoffMillis: 1000
      shardRetryTokenBucketCapacity: 1073741823

    rateLimiterFailpoint: &rateLimiterFailpoint
      failpoint.failIngressRequestRateLimiting:
        mode:
          # TODO SERVER-114130: Set to 0.25
          activationProbability: 0.00

    rateLimiterParamsWithFailpoint: &rateLimiterParamsWithFailpoint
      <<: *rateLimiterParams
      <<: *rateLimiterFailpoint

- name: auth_shell_options
  value:
    executor:
      config:
        shell_options:
          <<: *authOptions
          global_vars:
            TestData:
              <<: *authTestData

- name: auth_eval
  value:
    eval: jsTest.authenticate(db.getMongo())

- name: fixture_with_auth
  value:
    executor:
      fixture:
        auth_options: *authOptions
        mongos_options:
          keyFile: *keyFile
          set_parameters: *rateLimiterParams
        mongod_options:
          keyFile: *keyFile
          set_parameters: *rateLimiterParamsWithFailpoint

# SERVER-120171 Remove these hooks since we only need to re-define them to pass auth to the shell.
- name: auth_hooks_sharded
  value:
    executor:
      hooks:
        - {class: CheckReplDBHash, shell_options: *hookShellOpts}
        - {
            class: CheckMetadataConsistencyInBackground,
            shell_options: *hookShellOpts,
          }
        - {class: ValidateCollections, shell_options: *hookShellOpts}
        - {class: CheckShardFilteringMetadata, shell_options: *hookShellOpts}
        - {class: CheckOrphansDeleted, shell_options: *hookShellOpts}
        - *cleanEveryNHook

# SERVER-120171 Remove these hooks since we only need to re-define them to pass auth to the shell.
- name: auth_hooks_multi_stmt_txn
  value:
    executor:
      hooks:
        - {class: CheckReplDBHashInBackground, shell_options: *hookShellOpts}
        - {class: CheckReplDBHash, shell_options: *hookShellOpts}
        - {
            class: CheckMetadataConsistencyInBackground,
            shell_options: *hookShellOpts,
          }
        - {class: ValidateCollections, shell_options: *hookShellOpts}
        - {class: CheckShardFilteringMetadata, shell_options: *hookShellOpts}
        - {class: CheckOrphansDeleted, shell_options: *hookShellOpts}
        - *cleanEveryNHook

# File exclusions for auth (core tests)
- name: auth_exclude_files
  value:
    exclude_files:
      # Auth-specific test files.
      - jstests/core/**/*[aA]uth*.js
      # In the context of auth on mongos, illegal namespaces trigger a different error code than they do
      # on mongod. To keep the test simple, we avoid running it against a mongos when auth is enabled.
      - jstests/core/**/illegal_cmd_namespace.js
      # Logical sessions require that only one user be authenticated,
      # but this suite puts us in a multi-auth state.
      - jstests/core/**/list_all_sessions.js
      - jstests/core/**/list_sessions.js
      # These include operations the root user auth'd on the test database is not authorized to perform,
      # e.g. reading system.views, dropping or creating system collections.
      - jstests/core/**/list_collections_no_views.js
      - jstests/core/**/query/disallow_system_views_user_writes.js
      - jstests/core/**/rename_collection_system_db.js
      - jstests/core/catalog/agg_internal_list_collections_stage.js
      - jstests/core/catalog/views/invalid_system_views.js
      - jstests/core/catalog/views/view_with_invalid_dbname.js
      - jstests/core/catalog/views/views_creation.js
      - jstests/core/catalog/views/views_drop.js
      # TODO SERVER-120150: Re-enable all timeseries tests.
      - jstests/core/timeseries/ddl/*.js
      - jstests/core/timeseries/write/basic.js
      - jstests/core/timeseries/query/timeseries_buckets_query_explain.js
      - jstests/core/timeseries/write/timeseries_buckets_write_explain.js
      - jstests/core/timeseries/query/timeseries_raw_data_getmore.js
      - jstests/core/timeseries/query/timeseries_raw_data_internal_getmore.js
      - jstests/core/timeseries/query/timeseries_raw_data_queries.js
      - jstests/core/timeseries/write/timeseries_raw_data_writes.js
      - jstests/core/timeseries/query/timeseries_out_non_sharded.js

- name: auth_exclude_files_core_sharding
  value:
    exclude_files:
      # These include operations the root user auth'd on the test database is not authorized to perform,
      # e.g. reading system.views, dropping or creating system collections.
      - jstests/core_sharding/analyze_shard_key/configure_query_analyzer_cmd_validation.js
      - jstests/core_sharding/resharding/*.js
      # TODO SERVER-114130: Re-enable this test.
      - jstests/core_sharding/ddl/shard_collection_basic.js

- name: auth_exclude_files_fle2
  value:
    exclude_files:
      # This test creates unauthenticated connections.
      - src/mongo/db/modules/*/jstests/fle2/query/update_upsert.js

- name: auth_exclude_tags
  value:
    exclude_with_any_tags:
      # Test requires permissions that the __system user does not have.
      - assumes_superuser_permissions
      # Needs a specific role that is not granted to a regular user in auth suites.
      - needs_query_settings_user_role
      # Test creates and authenticates users, which conflicts with the suite's auth setup.
      - creates_and_authenticates_user
      # MapReduce with internal merge pipelines requires special permissions.
      - uses_map_reduce_internal_merge_pipeline
      # Parallel shell spawns unauthenticated connections.
      - uses_parallel_shell
