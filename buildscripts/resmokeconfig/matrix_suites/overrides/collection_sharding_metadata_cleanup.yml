- name: hooks
  value:
    executor:
      archive:
        tests: true
        hooks:
          - ClearCollectionShardingMetadataInBackground
      hooks:
        - class: ClearCollectionShardingMetadataInBackground
          frequency_seconds: 2
- name: exclusion_tags
  value:
    exclude_files:
      # TODO SERVER-121826 FLE2 tests internally run with transactions.
      # Some of them fail due to the transaction failing due to encountering a sharding
      # metadata clear randomly. This is a transient issue and can be retried, but
      # these tests fail to do so.
      - src/mongo/db/modules/*/jstests/fle2/**/*.js
      - jstests/fle2/**/*.js
    exclude_with_any_tags:
      - incompatible_with_random_sharding_metadata_clears
