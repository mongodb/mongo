### Overrides for change_streams_sharding_fsm suites ###
- name: batch_size_1
  value:
    executor:
      config:
        shell_options:
          global_vars:
            TestData:
              batchSize: 1

- name: embedded
  value:
    executor:
      config:
        shell_options:
          global_vars:
            TestData:
              configShard: true

- name: watch_collection
  value:
    executor:
      config:
        shell_options:
          global_vars:
            TestData:
              watchMode: "collection"

- name: watch_db
  value:
    executor:
      config:
        shell_options:
          global_vars:
            TestData:
              watchMode: "database"

- name: watch_cluster
  value:
    executor:
      config:
        shell_options:
          global_vars:
            TestData:
              watchMode: "cluster"

- name: irs
  value:
    executor:
      config:
        shell_options:
          global_vars:
            TestData:
              ignoreRemovedShards: true
              skipCheckOrphans: true
    selector:
      exclude_files:
        - jstests/change_stream_fsm/test_change_stream_sharding_fsm_comparison.js
        - jstests/change_stream_fsm/test_change_stream_sharding_command_generator.js

- name: pairwise_irs
  value:
    executor:
      config:
        shell_options:
          global_vars:
            TestData:
              pairwiseIrs: true
    selector:
      exclude_files:
        - jstests/change_stream_fsm/test_change_stream_sharding_fsm_continuous.js
        - jstests/change_stream_fsm/test_change_stream_sharding_fsm_fetch_and_resume.js
        - jstests/change_stream_fsm/test_change_stream_sharding_fsm_resume.js
        - jstests/change_stream_fsm/test_change_stream_sharding_command_generator.js

- name: bg_mutator
  value:
    executor:
      config:
        shell_options:
          eval: >-
            await import('jstests/libs/override_methods/implicit_change_stream_v2.js');
            await import('jstests/libs/override_methods/implicitly_retry_on_migration_in_progress.js');
            await import('jstests/libs/override_methods/implicitly_retry_on_fcv_upgrade_downgrade.js');
          global_vars:
            TestData:
              enableBgMutator: true
              migrationRetryJitterMS: 2000
              migrationRetryExtraDDLCommands:
                - "drop"
                - "dropDatabase"
                - "dropIndexes"
                - "insert"
                - "moveChunk"
                - "movePrimary"
                - "renameCollection"
                - "shardCollection"
                - "split"
              migrationRetryExtraDDLErrors:
                - "ReshardCollectionInterruptedDueToFCVChange"
                - "Interrupted"
              migrationRetryMatchFCVErrors: true
              threadOverrides:
                - "jstests/libs/override_methods/implicitly_retry_on_migration_in_progress.js"
                - "jstests/libs/override_methods/implicitly_retry_on_fcv_upgrade_downgrade.js"
