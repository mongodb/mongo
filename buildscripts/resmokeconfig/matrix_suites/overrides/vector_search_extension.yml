# The following include gRPC parameters needed for communication with mongot since the base class is
# not a community suite.
- name: extension_enabled_sharded_non_community
  value:
    executor:
      fixture:
        mongod_options:
          set_parameters:
            featureFlagExtensionsAPI: true
            featureFlagVectorSearchExtension: true
            featureFlagExtensionViewsAndUnionWith: false
            featureFlagSearchExtension: false
            featureFlagEgressGrpcForSearch: true
            skipAuthenticationToMongot: true
            useGrpcForSearch: 1
        mongos_options:
          set_parameters:
            featureFlagExtensionsAPI: true
            featureFlagVectorSearchExtension: true
            featureFlagExtensionViewsAndUnionWith: false
            featureFlagSearchExtension: false
            featureFlagEgressGrpcForSearch: true
            skipAuthenticationToMongot: true
            useGrpcForSearch: 1

