# Based on multi_shard_multi_stmt_txn_jscore_passthrough. This suite tests the js core with commands
# running in a multi statement transaction, and also with a simulated rate limiter enabled to reject
# random requests. The purpose of this passthrough is to add coverage on the retryability support in
# various process internal clients. With a high amount of maximum retries, no errors should bubble
# up to the driver, even with a balancer present.
base_suite: multi_shard_multi_stmt_txn_jscore_passthrough
overrides:
  - "sharded_rate_limiter_with_auth.auth_shell_options"
  - "sharded_rate_limiter_with_auth.auth_hooks_multi_stmt_txn"
  - "sharded_rate_limiter_with_auth.fixture_with_auth"
eval:
  - "sharded_rate_limiter_with_auth.auth_eval"
excludes:
  - "sharded_rate_limiter_with_auth.auth_exclude_files"
  - "sharded_rate_limiter_with_auth.auth_exclude_tags"
