base_suite: mongot_e2e_sharded_cluster
description: >-
  Runs the with_mongot e2e suite against a sharded cluster (not implicitly sharded) to test the real
  mongot-extension.
excludes:
  - "with_mongot_extension.exclude_incompatible_tests"
overrides:
  - "with_mongot_extension.load_extension"
  - "with_mongot_extension.extension_flags_sharded"
