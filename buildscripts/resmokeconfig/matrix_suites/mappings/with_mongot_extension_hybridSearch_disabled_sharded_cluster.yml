base_suite: mongot_e2e_sharded_cluster
description: >-
  Runs the with_mongot e2e suite against a sharded cluster (not implicitly sharded) to test the
  real mongot-extension, with every extension feature flag enabled except
  featureFlagExtensionsInsideHybridSearch.
excludes:
  - "with_mongot_extension.exclude_incompatible_tests"
  - "with_mongot_extension.exclude_sharded_incompatible_tests"
  - "with_mongot_extension.exclude_search_extension_incompatible"
overrides:
  - "with_mongot_extension.load_extension"
  - "with_mongot_extension.extension_flags_hybridSearch_disabled_sharded"
