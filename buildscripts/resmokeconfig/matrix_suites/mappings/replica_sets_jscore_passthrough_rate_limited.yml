# This suite tests the core JS tests against a replica set with the rate limiter enabled.
# The purpose is to verify that the rate limiter can be enabled without issue when proper
# client retry behavior is in place. With automatic retries enabled, no rate limit errors
# should bubble up to the test.
#
# Authentication is enabled so that the appName-based rate limiter exemptions are correctly
# applied to internal replica set traffic. See overrides/rate_limiter_with_auth.yml.
base_suite: replica_sets_jscore_passthrough_base
overrides:
  - "rate_limiter_with_auth.auth_shell_options"
  - "rate_limiter_with_auth.auth_hooks_replica_set"
  - "rate_limiter_with_auth.fixture_with_auth_replica_set"
eval:
  - "rate_limiter_with_auth.auth_eval"
  - "rate_limiter_with_auth.rate_limiter_shell_override"
excludes:
  - "rate_limiter_with_auth.auth_exclude_files_replica_set"
  - "rate_limiter_with_auth.auth_exclude_files_fle2"
  - "rate_limiter_with_auth.auth_exclude_tags"
