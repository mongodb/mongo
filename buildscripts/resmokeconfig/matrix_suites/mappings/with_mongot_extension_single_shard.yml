base_suite: mongot_e2e_single_shard
description: >-
  Runs the with_mongot e2e suite against a one-shard cluster to test the real
  mongot-extension.
excludes:
  - "with_mongot_extension.exclude_incompatible_tests"
  - "with_mongot_extension.exclude_incompatible_tests_sharded"
overrides:
  - "with_mongot_extension.load_extension"
  - "with_mongot_extension.extension_flags_sharded"
