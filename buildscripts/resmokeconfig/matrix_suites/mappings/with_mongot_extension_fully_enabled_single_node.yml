base_suite: mongot_e2e_single_node
description: >-
  Runs the with_mongot e2e suite against a single node replica set to test the real
  mongot-extension, with every extension feature flag enabled.
excludes:
  - "with_mongot_extension.exclude_incompatible_tests"
  - "with_mongot_extension.exclude_search_extension_incompatible"
overrides:
  - "with_mongot_extension.load_extension"
  - "with_mongot_extension.extension_flags_fully_enabled"
extends:
  - "with_mongot_extension.search_extension_only_roots"
