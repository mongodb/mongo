base_suite: mongot_e2e_sharded_collections
description: >-
  Runs the with_mongot e2e suite against a sharded cluster with implicitly-sharded collections to test the real
  mongot-extension, with every extension feature flag enabled.
excludes:
  - "with_mongot_extension.exclude_incompatible_tests"
overrides:
  - "with_mongot_extension.load_extension"
  - "with_mongot_extension.extension_flags_fully_enabled_sharded"
extends:
  - "with_mongot_extension.search_extension_only_roots"
