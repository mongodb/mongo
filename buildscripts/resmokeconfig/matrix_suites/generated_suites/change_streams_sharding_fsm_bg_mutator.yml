            - Interrupted
          migrationRetryMatchFCVErrors: true
          threadOverrides:
            - jstests/libs/override_methods/implicitly_retry_on_migration_in_progress.js
            - jstests/libs/override_methods/implicitly_retry_on_fcv_upgrade_downgrade.js
