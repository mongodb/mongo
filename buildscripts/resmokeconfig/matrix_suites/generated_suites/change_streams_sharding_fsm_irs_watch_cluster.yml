          migrationRetryJitterMS: 2000
          migrationRetryMatchFCVErrors: true
          skipCheckOrphans: true
          threadOverrides:
            - jstests/libs/override_methods/implicitly_retry_on_migration_in_progress.js
          watchMode: cluster
      nodb: ""
matrix_suite: true
selector:
