test_kind: js_test
selector:
  roots:
    - jstests/write_path/timeseries/pbt/*.js

executor:
  config:
    shell_options:
      global_vars:
        TestData:
          fastCheckParameters:
            numRuns: 75
            minCommands: 1
            maxCommands: 250
  hooks:
    - class: ValidateCollections
    - class: CleanEveryN
      n: 20
  fixture:
    class: MongoDFixture
    mongod_options:
      set_parameters:
        enableTestCommands: 1
