test_kind: js_test

selector:
  from_target: //jstests/suites/security:ssl_x509

# ssl tests start their own mongod's.
executor:
  config:
    shell_options:
      nodb: ""
      ssl: ""
      sslAllowInvalidCertificates: ""
      sslCAFile: ${x509ObjDir}/ca.pem
      # We use server.pem so that shell can auth as __system.
      sslPEMKeyFile: ${x509ObjDir}/server.pem
      global_vars:
        TestData:
          setParameters:
            logComponentVerbosity: "{network:2}"
          setParametersMongos:
            logComponentVerbosity: "{network:2}"
