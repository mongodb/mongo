test_kind: js_test
selector:
  roots:
    - jstests/write_path/timeseries/pbt/**/*_pbt.js
  # TODO (SERVER-122997) Re-enable when this fix is made
  exclude_files:
    - jstests/write_path/timeseries/pbt/large_measurements/timeseries_measurement_limit_pbt.js

executor:
  archive:
    hooks:
      - CheckReplDBHash
      - CheckMetadataConsistencyInBackground
      - ValidateCollections
  config:
    shell_options:
      global_vars:
        TestData:
          fastCheckParameters:
            numRuns: 75
            minCommands: 1
            maxCommands: 250
  hooks:
    - class: CheckReplDBHash
    - class: CheckMetadataConsistencyInBackground
    - class: ValidateCollections
    - class: CheckShardFilteringMetadata
    - class: CheckOrphansDeleted
    - class: CleanEveryN
      n: 20
  fixture:
    class: ShardedClusterFixture
    num_shards: 2
    num_mongos: 2
    num_rs_nodes_per_shard: 1
    mongos_options:
      set_parameters:
        enableTestCommands: 1
    mongod_options:
      set_parameters:
        enableTestCommands: 1
