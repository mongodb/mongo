config_variables:
  - &keyFile jstests/libs/authTestsKey
  - &keyFileData Thiskeyisonlyforrunningthesuitewithauthenticationdontuseitinanytestsdirectly

test_kind: js_test

selector:
  roots:
    - jstests/with_mongot/vector_search_mocked/*.js

executor:
  config:
    shell_options:
      global_vars:
        TestData:
          auth: true
          authMechanism: SCRAM-SHA-256
          keyFile: *keyFile
          keyFileData: *keyFileData
          roleGraphInvalidationIsFatal: true
          setParameters:
            # Disable signature validation on test-signed extensions as they fail on secure-mode builds.
            # NOTE: Production verification is covered by extensions_secure_mode suites. See SERVER-123691.
            featureFlagExtensionsApiSignatureValidation: false
      nodb: ""
