test_kind: js_test

selector:
  roots:
    - src/mongo/db/modules/*/jstests/streams/aspio/pubsub/pubsub.js
    - src/mongo/db/modules/*/jstests/streams/aspio/pubsub/pubsub_errors.js
    - src/mongo/db/modules/*/jstests/streams/aspio/pubsub/pubsub_checkpoint.js
  exclude_files:
    # TODO(SERVER-117494): Re-enable once evg configuration is resolved.
    - src/mongo/db/modules/*/jstests/streams/aspio/pubsub/pubsub_gwproxy.js

executor:
  fixture:
    class: ReplicaSetFixture
    mongod_options:
      bind_ip_all: ""
      set_parameters:
        enableTestCommands: 1
        featureFlagStreams: true
        diagnosticDataCollectionEnabled: false
    num_nodes: 1
