test_kind: js_test

selector:
  roots:
    - src/mongo/db/modules/*/jstests/streams_kafka/kafka5_rebalancing.js
    - src/mongo/db/modules/*/jstests/streams_kafka/kafka5_watermarks.js
    - src/mongo/db/modules/*/jstests/streams_kafka/kafka_topic_deleted.js

executor:
  fixture:
    class: ReplicaSetFixture
    mongod_options:
      bind_ip_all: ""
      set_parameters:
        enableTestCommands: 1
        featureFlagStreams: true
        diagnosticDataCollectionEnabled: false
    num_nodes: 1
