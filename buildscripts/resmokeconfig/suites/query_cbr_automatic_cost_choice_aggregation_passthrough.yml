# This is equivalent to the aggregation suite, but runs with CBR with automatic CE with cost choice enabled.

test_kind: js_test

selector:
  roots:
    - jstests/aggregation/**/*.js
  exclude_files:
    - jstests/aggregation/extras/*.js
    - jstests/aggregation/data/*.js

    # TODO SERVER-92589: Fails in all feature flags variant because SBE explain not supported
    - jstests/aggregation/optimization/use_query_sort.js

  exclude_with_any_tags:
    # Profiler entries will have different shape in CBR
    - requires_profiling
    # CBR can run multiplanning trials even for CBR chosen solutions in which case it will be a single solution.
    # This can break tests that expect explain to succeed in the single solution case.
    - does_not_support_multiplanning_single_solutions
executor:
  config:
    shell_options:
      eval: await import("jstests/libs/override_methods/detect_spawning_own_mongod.js");
  fixture:
    class: MongoDFixture
    mongod_options:
      set_parameters:
        enableTestCommands: 1
        featureFlagCostBasedRanker: true
        internalQueryCBRCEMode: "automaticCE"
        automaticCEPlanRankingStrategy: "CBRCostBasedRankerChoice"
        internalQuerySamplingBySequentialScan: true
