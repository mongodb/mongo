test_kind: js_test

selector:
  roots:
    - src/mongo/db/modules/*/jstests/streams_kafka/kafka3_key_formats_headers.js
    - src/mongo/db/modules/*/jstests/streams_kafka/kafka3_batches.js
    - src/mongo/db/modules/*/jstests/streams_kafka/kafka5_recovery.js

executor:
  fixture:
    class: ReplicaSetFixture
    mongod_options:
      bind_ip_all: ""
      set_parameters:
        enableTestCommands: 1
        featureFlagStreams: true
        diagnosticDataCollectionEnabled: false
    num_nodes: 1
