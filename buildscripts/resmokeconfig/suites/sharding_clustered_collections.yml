test_kind: js_test

selector:
  roots:
    - jstests/sharding/**/*.js
  exclude_files:
    - jstests/sharding/**/libs/**/*.js
    # Expects hint(_id) to yield an index scan instead of a table scan.
    - jstests/sharding/shard2.js
  exclude_with_any_tags:
    - expects_explicit_underscore_id_index
    # The default suite runs change streams as v2; v1-pinned tests use scaffolding (e.g.
    # 'shardedAggregateHangBeforeEstablishingShardCursors') that v2 doesn't trigger.
    - assumes_change_streams_v1

executor:
  config:
    shell_options:
      nodb: ""
      global_vars:
        TestData:
          setParameters:
            enableTestCommands: 1
            failpoint.clusterAllCollectionsByDefault: "{mode: 'alwaysOn'}"
