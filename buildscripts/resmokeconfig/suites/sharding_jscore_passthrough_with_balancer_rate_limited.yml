# Based on sharding_jscore_passthrough_base. This suite tests the js core with a balancer and with a
# simulated rate limiter enabled to reject random requests. The purpose of this passthrough is to
# add coverage on the retryability support in various process internal clients. With a high amount
# of maximum retries, no errors should bubble up to the driver, even with a balance present.

test_kind: js_test

selector:
  from_target: //jstests/suites/workload-resilience:sharding_jscore_passthrough_with_balancer_rate_limited

executor:
  archive:
    hooks:
      - CheckReplDBHash
      - CheckMetadataConsistencyInBackground
      - ValidateCollections
  config:
    shell_options:
      global_vars:
        TestData:
          runningWithBalancer: true
          # Read-only flag to quickly know this suite is setting the pauseMigrationsDuringMultiUpdates on every mongos
          pauseMigrationsDuringMultiUpdates: true
      eval: await import("jstests/libs/override_methods/implicitly_retry_on_migration_in_progress.js");
  hooks:
    - class: CheckReplDBHash
    - class: CheckMetadataConsistencyInBackground
    - class: ValidateCollections
    - class: CheckShardFilteringMetadata
    - class: CheckOrphansDeleted
    - class: CleanEveryN
      n: 20
  fixture:
    class: ShardedClusterFixture
    mongos_options:
      set_parameters:
        enableTestCommands: 1
        defaultClientMaxRetryAttempts: 16
        defaultClientBaseBackoffMillis: 10
        defaultClientMaxBackoffMillis: 1000
        shardRetryTokenBucketCapacity: 1073741823
        # TODO SERVER-115873: use the default maxRoundsWithoutProgressParameter.
        maxRoundsWithoutProgressParameter: 20
    mongod_options:
      set_parameters:
        enableTestCommands: 1
        reshardingMinimumOperationDurationMillis: 0
        useBatchedDeletesForRangeDeletion: true
        defaultClientMaxRetryAttempts: 16
        defaultClientBaseBackoffMillis: 10
        defaultClientMaxBackoffMillis: 1000
        shardRetryTokenBucketCapacity: 1073741823
        failpoint.failIngressRequestRateLimiting:
          mode:
            activationProbability: 0.25
        ingressRequestRateLimiterApplicationExemptions: >
          {"appNames":["MongoDB Internal Client",
                      "NetworkInterfaceTL-ReplNetwork",
                      "NetworkInterfaceTL-ReplCoordExternNetwork",
                      "NetworkInterfaceTL-ReplNodeDbWorkerNetwork",
                      "NetworkInterfaceTL-ReplicaSetMonitor-TaskExecutor",
                      "NetworkInterfaceTL-HelloMe-TaskExecutor",
                      "NetworkInterfaceTL-AddShardCoordinator-TaskExecutor",
                      "NetworkInterfaceTL-ConfigsvrCoordinatorServiceNetwork",
                      "NetworkInterfaceTL-StandaloneNetwork",
                      "NetworkInterfaceTL-ShardingDDLCoordinatorNetwork"]}
    num_rs_nodes_per_shard: 1
    num_mongos: 3
    num_shards: 2
    enable_balancer: true
    random_migrations: true
    set_cluster_parameter:
      parameter: pauseMigrationsDuringMultiUpdates
      value:
        enabled: True
