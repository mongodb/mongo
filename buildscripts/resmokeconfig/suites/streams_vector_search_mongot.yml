test_kind: js_test

selector:
  roots:
    - src/mongo/db/modules/*/jstests/streams/aspio/mongot/vector_search_mongot.js
  # TODO SERVER-128217: re-enable once the mongo shell no longer imports jstests/libs at startup,
  # which crashes the shell inside the mongostream container where jstests/ is not present.
  exclude_files:
    - src/mongo/db/modules/*/jstests/streams/aspio/mongot/vector_search_mongot.js

executor:
  fixture:
    class: ReplicaSetFixture
    mongod_options:
      bind_ip_all: ""
      set_parameters:
        enableTestCommands: 1
        featureFlagStreams: true
        diagnosticDataCollectionEnabled: false
    num_nodes: 1
