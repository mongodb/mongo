# This test suite runs a subset of 'core' tests with the 'implicit_explain_v3_verbosity.js' override, which
# translates the legacy explain verbosities into their V3 counterparts:
#
#   queryPlanner       -> plannerChoice
#   executionStats     -> execStats
#   allPlansExecution  -> plannerStats
#
# This provides coverage of the V3 explain verbosities by reusing the existing core explain tests.

test_kind: js_test

selector:
  roots:
    - jstests/core/**/*.js
  # Most 'core' tests do not run explain. Rather than narrow by path, we select only the tests
  # tagged 'uses_explain' so this suite stays precise as tests are added or moved.
  include_with_any_tags:
    - uses_explain
  exclude_files:
    # Transactions are not supported on MongoDB standalone nodes.
    - jstests/core/txns/**/*.js
    # Queryable encryption is not supported on standalone.
    - jstests/core/query/queryable_encryption/**/*.js
    # Query settings are not supported on standalone.
    - jstests/core/query/query_settings/**/*.js
    # Shard level user write block is not supported on standalone.
    - jstests/core/administrative/block_replica_set_writes.js

    # The following tests run explain of a rooted $or query, which is not currently supported in V3
    # explain.
    # TODO SERVER-131818 enable these tests once CBR supports rooted $or queries.
    - jstests/core/index/indexn.js
    - jstests/core/query/or_use_clustered_collection.js
    - jstests/core/query/or/oro.js
    - jstests/core/query/or/or_to_in.js
    - jstests/core/index/not_index_tagging.js
    - jstests/core/query/or/subplanning_plan_quality.js
    - jstests/core/index/wildcard/wildcard_index_multikey.js
    - jstests/core/query/force_plan.js
    - jstests/core/query/internal_strip_invalid_assignment.js
    - jstests/core/query/explain/explain_plan_cache.js
    - jstests/core/query/sort/sort_merge_collation.js
    - jstests/core/index/wildcard/wildcard_index_collation.js
    - jstests/core/index/wildcard/compound_wildcard_index_residual.js
    - jstests/core/query/distinct/distinct_subplanning.js
    - jstests/core/index/wildcard/wildcard_index_basic_index_bounds.js
    - jstests/core/query/sort/sort_merge.js
    - jstests/core/query/or/ord.js
    - jstests/core/index/wildcard/wildcard_and_text_indexes.js
    - jstests/core/index/index_for_sort.js
    - jstests/core/index/wildcard/compound_wildcard_index_or.js
    - jstests/core/query/explain/explain6.js
executor:
  archive:
    hooks:
      - ValidateCollections
  config:
    shell_options:
      crashOnInvalidBSONError: ""
      objcheck: ""
      eval: >-
        await import("jstests/libs/override_methods/detect_spawning_own_mongod.js");
        await import("jstests/libs/override_methods/query/implicit_explain_v3_verbosity.js");
  hooks:
    - class: ValidateCollections
      shell_options:
        global_vars:
          TestData:
            skipValidationOnNamespaceNotFound: false
    - class: CleanEveryN
      n: 20
  fixture:
    class: MongoDFixture
    mongod_options:
      set_parameters:
        enableTestCommands: 1
        internalQueryStatsRateLimit: -1
        internalQueryStatsWriteCmdSampleRate: 1.0
        internalQueryStatsErrorsAreCommandFatal: true
