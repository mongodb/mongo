test_kind: js_test

selector:
  roots:
    - src/mongo/db/modules/*/jstests/streams_kafka/kafka2_consumer_groups.js
    - src/mongo/db/modules/*/jstests/streams_kafka/kafka2.js
    - src/mongo/db/modules/*/jstests/streams_kafka/kafka1_message_size.js

executor:
  fixture:
    class: ReplicaSetFixture
    mongod_options:
      bind_ip_all: ""
      set_parameters:
        enableTestCommands: 1
        featureFlagStreams: true
        diagnosticDataCollectionEnabled: false
    num_nodes: 1
