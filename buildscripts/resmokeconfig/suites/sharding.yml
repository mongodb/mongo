test_kind: js_test

selector:
  roots:
    - jstests/sharding/**/*.js
    - src/mongo/db/modules/enterprise/jstests/sharding/range_deleter_script_with_shard_keys.js
    - src/mongo/db/modules/enterprise/jstests/sharding/range_deleter_script_with_crud.js
  exclude_files:
    - jstests/sharding/**/libs/**/*.js
  exclude_with_any_tags:
    # The default suite runs change streams as v2; v1-pinned tests use scaffolding (e.g.
    # 'shardedAggregateHangBeforeEstablishingShardCursors') that v2 doesn't trigger.
    - assumes_change_streams_v1

executor:
  archive:
    tests:
      - jstests/sharding/*reshard*.js
  config:
    shell_options:
      nodb: ""
