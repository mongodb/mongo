test_kind: js_test

selector:
  roots:
    - jstests/with_mongot/vector_search_mocked/ssl/*.js

executor:
  config:
    shell_options:
      global_vars:
        TestData:
          setParameters:
            # Disable signature validation on test-signed extensions as they fail on secure-mode builds.
            # NOTE: Production verification is covered by extensions_secure_mode suites. See SERVER-123691.
            featureFlagExtensionsApiSignatureValidation: false
      nodb: ""
      ssl: ""
      tlsAllowInvalidHostnames: ""
      tlsAllowInvalidCertificates: ""
      tlsCAFile: ${x509ObjDir}/ca.pem
      tlsCertificateKeyFile: ${x509ObjDir}/client.pem
