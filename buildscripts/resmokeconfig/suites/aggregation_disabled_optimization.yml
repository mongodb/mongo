test_kind: js_test

selector:
  from_target: //jstests/suites/query-optimization:aggregation_disabled_optimization

executor:
  archive:
    hooks:
      - ValidateCollections
  config: {}
  hooks:
    - class: ValidateCollections
    - class: CleanEveryN
      n: 20
  fixture:
    class: MongoDFixture
    mongod_options:
      set_parameters:
        enableTestCommands: 1
        failpoint.disablePipelineOptimization:
          mode: alwaysOn
