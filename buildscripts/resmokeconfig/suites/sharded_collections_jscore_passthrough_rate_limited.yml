# This suite tests the core collection functionality with a simulated rate limiter enabled to reject
# random requests. The purpose of this passthrough is to add coverage on the retryability support in
# various process internal clients. With a high amount of maximum retries, no errors should bubble
# up to the driver.

test_kind: js_test

selector:
  from_target: //jstests/suites/workload-resilience:sharded_collections_jscore_passthrough_rate_limited

executor:
  archive:
    hooks:
      - CheckReplDBHash
      - CheckMetadataConsistencyInBackground
      - ValidateCollections
  config:
    shell_options:
      eval: await import("jstests/libs/override_methods/implicitly_shard_accessed_collections.js");
  hooks:
    - class: CheckReplDBHash
    - class: CheckMetadataConsistencyInBackground
    - class: ValidateCollections
    - class: CheckShardFilteringMetadata
    - class: CheckOrphansDeleted
    - class: CleanEveryN
      n: 20
  fixture:
    class: ShardedClusterFixture
    num_shards: 2
    num_mongos: 3
    enable_balancer: false
    mongos_options:
      set_parameters:
        enableTestCommands: 1
        defaultClientMaxRetryAttempts: 16
        defaultClientBaseBackoffMillis: 10
        defaultClientMaxBackoffMillis: 1000
        shardRetryTokenBucketCapacity: 1073741823
    mongod_options:
      set_parameters:
        enableTestCommands: 1
        defaultClientMaxRetryAttempts: 16
        defaultClientBaseBackoffMillis: 10
        defaultClientMaxBackoffMillis: 1000
        shardRetryTokenBucketCapacity: 1073741823
        failpoint.failIngressRequestRateLimiting:
          mode:
            activationProbability: 0.25
        ingressRequestRateLimiterApplicationExemptions: >
          {"appNames":["MongoDB Internal Client",
                      "NetworkInterfaceTL-ReplNetwork",
                      "NetworkInterfaceTL-ReplCoordExternNetwork",
                      "NetworkInterfaceTL-ReplNodeDbWorkerNetwork",
                      "NetworkInterfaceTL-ReplicaSetMonitor-TaskExecutor",
                      "NetworkInterfaceTL-HelloMe-TaskExecutor",
                      "NetworkInterfaceTL-AddShardCoordinator-TaskExecutor",
                      "NetworkInterfaceTL-ConfigsvrCoordinatorServiceNetwork",
                      "NetworkInterfaceTL-StandaloneNetwork",
                      "NetworkInterfaceTL-ShardingDDLCoordinatorNetwork"]}
