    - src/mongo/db/modules/*/jstests/streams/change_stream_source.js
    - src/mongo/db/modules/*/jstests/streams/connection_errors_2.js
    - src/mongo/db/modules/*/jstests/streams/change_stream_source_initial_sync_checkpoint.js
    - src/mongo/db/modules/*/jstests/streams/timeseries_emit_parallel.js
