test_kind: js_test
selector:
  from_target: //jstests/suites/transactions:sharded_collections_causally_consistent_jscore_txns_passthrough

executor:
  archive:
    hooks:
      - CheckMetadataConsistencyInBackground
      - ValidateCollections
  config:
    shell_options:
      eval: >-
        globalThis.testingReplication = true;
        await import('jstests/libs/override_methods/enable_causal_consistency_without_read_pref.js');
        await import('jstests/libs/override_methods/implicitly_shard_accessed_collections.js');
  hooks:
    # We don't execute dbHash or oplog consistency checks since there is only a single replica set
    # node.
    - class: CheckMetadataConsistencyInBackground
    - class: ValidateCollections
    - class: CheckShardFilteringMetadata
    - class: CheckOrphansDeleted
    - class: CleanEveryN
      n: 20
  fixture:
    class: ShardedClusterFixture
    num_mongos: 3
    mongos_options:
      set_parameters:
        enableTestCommands: 1
    mongod_options:
      set_parameters:
        enableTestCommands: 1
    num_rs_nodes_per_shard: 2
    num_shards: 2
