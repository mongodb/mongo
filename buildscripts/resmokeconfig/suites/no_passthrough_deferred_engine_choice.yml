test_kind: js_test
description: |
  Temporary no_passthrough suite for deferred get_executor project.

selector:
  roots:
    - jstests/noPassthrough/**/*.js
    - jstests/libs/property_test_helpers/self_tests/*.js
    - src/mongo/db/modules/*/jstests/live_import/*.js
    - src/mongo/db/modules/*/jstests/live_restore/*.js
    - src/mongo/db/modules/*/jstests/no_passthrough/*.js

    # Self-tests for the Concurrency testing framework are run as part of this test suite.
    - jstests/concurrency/*.js
  exclude_files:
    - jstests/noPassthrough/libs/**/*.js

    # TODO SERVER-119773 implement SBE plan cache in new get executor
    - jstests/noPassthrough/query/plan_cache/sbe_plan_cache_clear_on_param_change.js
    - jstests/noPassthrough/query/plan_cache/plan_cache_group_lookup.js
    - jstests/noPassthrough/query/plan_cache/sbe_plan_cache_with_const_let_var.js

    # This test is incompatible with the deferred engine selection because it asserts
    # that a query that uses SBE and a query that uses classic have different cache
    # keys, which is not true under the `GetExecutorDeferredEngineChoice` flag.
    - jstests/noPassthrough/query/plan_cache/sbe_plan_cache_key_reporting.js

  exclude_with_any_tags:
    - requires_kernel_619

# noPassthrough tests start their own mongod's.
executor:
  archive:
    tests:
      - jstests/noPassthrough/oplog_writes_only_permitted_on_standalone.js
      - jstests/noPassthrough/wt_unclean_shutdown.js
      - src/mongo/db/modules/*/jstests/live_restore/*.js
  config:
    shell_options:
      nodb: ""
      global_vars:
        TestData:
          setParameters:
            featureFlagGetExecutorDeferredEngineChoice: true
