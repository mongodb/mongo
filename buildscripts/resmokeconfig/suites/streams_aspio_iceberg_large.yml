    - src/mongo/db/modules/*/jstests/streams/aspio/iceberg/iceberg_benchmark_tpcc_inserts_updates_1kb.js
    - src/mongo/db/modules/*/jstests/streams/aspio/iceberg/iceberg_benchmark_tpcc_only_inserts.js
    - src/mongo/db/modules/*/jstests/streams/aspio/iceberg/iceberg_benchmark_tpcc_initial_sync_updates.js
