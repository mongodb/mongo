test_kind: js_test

selector:
  from_target: //jstests/suites/security:ssl

# ssl tests start their own mongod's.
executor:
  config:
    shell_options:
      nodb: ""
      tls: ""
      tlsAllowInvalidCertificates: ""
      tlsCAFile: ${x509ObjDir}/ca.pem
      tlsCertificateKeyFile: ${x509ObjDir}/client.pem
      global_vars:
        TestData:
          setParameters:
            logComponentVerbosity: "{network:2}"
          setParametersMongos:
            logComponentVerbosity: "{network:2}"
