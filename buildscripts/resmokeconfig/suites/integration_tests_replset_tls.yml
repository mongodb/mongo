# Runs the executor_integration_test binary against a TLS-enabled replica set (no auth).
# This gives TLS coverage for the egress connection pool rate-limiter resilience tests
# which are exercised via the executor_integration_test binary but skipped under the
# gRPC suite (SKIP_ON_GRPC_RATE_LIMITER) and not covered by integration_tests_replset_ssl_auth
# (which only runs network_interface_ssl_test).
test_kind: cpp_integration_test

selector:
  root: bazel-bin/install/install-mongo_integration_test_test_list.txt
  include_files:
    - bazel-bin/**/executor_integration_test*
  exclude_files:
    - bazel-bin/**/grpc_transport_integration_test # Must be run with parameters in the integration_tests_standalone_grpc variant

executor:
  archive:
    hooks:
      - CheckReplDBHash
      - CheckReplOplogs
      - ValidateCollections
  config:
    program_options:
      tlsMode: "preferTLS"
      tlsCAFile: ${x509ObjDir}/ca.pem
      tlsCertificateKeyFile: ${x509ObjDir}/client.pem
  hooks:
    - class: CheckReplOplogs
    - class: CheckReplDBHash
    - class: ValidateCollections
  fixture:
    class: ReplicaSetFixture
    mongod_options:
      set_parameters:
        logComponentVerbosity:
          command: 2
        enableTestCommands: 1
      tlsMode: preferTLS
      tlsCAFile: ${x509ObjDir}/ca.pem
      tlsCertificateKeyFile: ${x509ObjDir}/server.pem
    num_nodes: 2
