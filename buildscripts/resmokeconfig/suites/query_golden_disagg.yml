test_kind: js_test

selector:
  roots:
    - jstests/query_golden/**/*.js
  exclude_files:
    - jstests/query_golden/libs/**/*.js
    - jstests/query_golden/test_inputs/**/*.js
    - jstests/query_golden/join_opt/plan_stability*.js
    # TODO (SERVER-122382) Re-enable the following tests
    - jstests/query_golden/plan_stability2.js
    - jstests/query_golden/plan_stability.js
  exclude_with_any_tags:
    # TODO SERVER-121517: Remove after updating test to account for profiling level > 0 not being supported in disagg.
    - requires_profiling

executor:
  config:
    shell_options:
      global_vars:
        TestData:
          # TODO(SERVER-112499): Remove.
          skipEnforceFastCountOnValidate: true
      eval: |
        // Keep the following imports in sync with query_golden_*.yml.
        await import("jstests/libs/override_methods/detect_spawning_own_mongod.js");
        await import("jstests/libs/override_methods/golden_overrides.js");
        import {beginGoldenTest} from "jstests/libs/begin_golden_test.js";
        beginGoldenTest("jstests/query_golden/expected_output");
        // Enforce plain log format until json format is the default.
        TestData.logFormat = "plain";
  hooks:
    - class: ValidateCollections
      shell_options:
        global_vars:
          TestData:
            skipValidationOnNamespaceNotFound: false
            skipEnforceFastCountOnValidate: true
  fixture:
    class: DisaggReplicaSetFixture
    mongod_options:
      set_parameters:
        enableTestCommands: 1
    # TODO(SERVER-120518): change num_nodes to 2
    num_nodes: 1
