test_kind: js_test

selector:
  roots:
    - jstests/query_golden_sharding/**/*.js

executor:
  config:
    shell_options:
      crashOnInvalidBSONError: ""
      objcheck: ""
      eval: |
        // enables disagg
        await import("src/mongo/db/modules/atlas/jstests/disagg_storage/libs/disagg_storage_override.js");
        import {beginGoldenTest} from "jstests/libs/begin_golden_test.js";
        await import("jstests/libs/override_methods/sharded_golden_overrides.js");
        beginGoldenTest("jstests/query_golden_sharding/expected_output", ".md");
        // Enforce plain log format until json format is the default.
        TestData.logFormat = "plain";
      nodb: ""
      global_vars:
        TestData:
          setParameters:
            defaultConfigCommandTimeoutMS: 90000
          setParametersMongos:
            defaultConfigCommandTimeoutMS: 90000
          # This overrides the default number of nodes for each ReplicaSet created by a ShardingTest object.
          defaultReplSetNumNodes: 2
          # TODO(SERVER-116998): Inter-node collection hash validation is an ASC-only check.
          skipInterNodeCollectionHashValidation: true
          # TODO(SERVER-115393): Remove if possible.
          supportsParallelReplSetInitiateAndStop: false
          # TODO(SERVER-112499): Remove.
          skipEnforceFastCountOnValidate: true
          # TODO(SLS-1414): Remove.
          doesNotSupportGracefulStepdown: true
          # TODO(SERVER-113063): Remove.
          skipAwaitReplicationConfigVersionCheck: true
          # TODO(SERVER-116413): Remove.
          skipConsistencyCheckForNewPrimaryOpEntry: true
          # DSC doesn't support storing findAndModify pre/post-images in config.image_collection.
          doesNotSupportFindAndModifyImageCollection: true
  hooks:
    - class: ContainerCleanup
