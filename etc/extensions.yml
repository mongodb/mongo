    variants:
      amazon2023-x86_64: 44d737993f12ff8e56595538e0c72c9d7a6c37456c888d7f62514fc41a6757b7
      amazon2023-aarch64: 5e56e70fd0e3f62539bdd29f8ebf4829b1514a4670f307b41987c5ebeb1f7277
