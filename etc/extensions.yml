# mongo/etc/extensions.yml

# Artifact URI is {base_url}{name}-{version}-{variant}.tgz
#
# Example: for artifacts at
#  - https://mongot-extension.s3.amazonaws.com/release/mongot-extension-0.0.0-amazon2023-x86_64.tgz
#  - https://mongot-extension.s3.amazonaws.com/release/mongot-extension-0.0.0-amazon2023-aarch64.tgz
#
#    base_url: https://mongot-extension.s3.amazonaws.com/release/
#    name: mongot-extension
#    version: 0.0.0
#    variants:
#      amazon2023-x86_64: checksum3
#      amazon2023-aarch64: checksum4

extensions:
  mongot_extension:
    base_url: https://mongot-extension.s3.amazonaws.com/release/
    name: mongot-extension
    version: 2.0.3
    variants:
      amazon2023-x86_64: 8a6842e6f0ab74355e39a941b5f87cf622f406c18bf3ff9d22feee6cfd032732
      amazon2023-aarch64: 794852be5cdc80b355acc20c90a5637be0d79994872682cc21dc60c4c8a27012
  rerank_extension:
    base_url: https://mongot-extension.s3.amazonaws.com/release/
    name: rerank-extension
    version: 2.0.3
    variants:
      amazon2023-x86_64: c5f00f2580f7b4891eeac1839e6e702e0be2730dedeb009423e3794597321cd0
      amazon2023-aarch64: 183159ba3d770b0e3b6d2b2025937872c9a4ca96c6281c57411aaea9772c5f5c
