# Amazon build variants for testing streams in development environments
#
# After the branching variants in this file
# should NOT run on a new rapid release (v7.1, v7.2 etc.)
# and LTS release (v7.0, v6.0 etc.) branch projects

variables:
  - &sys_perf_compile_expansions
    platform: linux
    project_dir: dsi
    has_packages: false

buildvariants:
  - name: enterprise-amazon2023-streams
    display_name: "Amazon Linux 2023 enterprise streams"
    modules: ["asp-js-engine"]
    run_on:
      - amazon2023-latest-small
    expansions:
      streams_exec_timeout_secs: 720
      test_flags: >-
        --excludeWithAnyTags=SERVER-34286,incompatible_with_amazon_linux,requires_external_data_source,requires_ldap_pool
        --additionalFeatureFlags=featureFlagStreams
      bazel_compile_flags: >-
        --define=MONGO_DISTMOD=amazon2023
        --streams_release_build=True
      release_rbe: true
      evergreen_remote_exec: on
      multiversion_platform: amazon2023
      multiversion_edition: enterprise-streams
      compile_variant: enterprise-amazon2023-streams
      large_distro_name: amazon2023.3-c5-24xlarge
      packager_distro: amazon2023
      packager_arch: x86_64
    display_tasks:
      - name: streams_tests
        execution_tasks:
          - streams_0
          - streams_1
          - streams_2
          - streams_3
          - streams_4
          - streams_5
          - streams_6
          - streams_7
          - streams_8
          - streams_9
      - name: streams_kafka_tests
        execution_tasks:
          - streams_kafka_0
          - streams_kafka_1
          - streams_kafka_2
          - streams_kafka_3
          - streams_kafka_4
          - streams_kafka_5
          - streams_kafka_6
          - streams_kafka_7
          - streams_kafka_8
          - streams_kafka_9
          - streams_kafka_10
          - streams_kafka_11
          - streams_kafka_gwproxy
          - streams_kafka_benchmark
      - name: streams_aspio_tests
        execution_tasks:
          - streams_aspio
          - streams_aspio_iceberg_0
          - streams_aspio_iceberg_1
          - streams_aspio_iceberg_2
          - streams_aspio_iceberg_3
          - streams_aspio_iceberg_4
          - streams_aspio_iceberg_large
          - streams_aspio_iceberg_5
          - streams_aspio_utilities
          - streams_aspio_pubsub
      - name: streams_s3_tests
        execution_tasks:
          - streams_s3_single
          - streams_s3_parallel
          - streams_s3_parallel_heavy
      - name: streams_azure_blob_tests
        execution_tasks:
          - streams_azure_blob_single
          - streams_azure_blob_parallel
          - streams_azure_blob_parallel_heavy
    tasks:
      - name: compile_and_archive_dist_test_TG
        distros:
          - amazon2023.3-c5-24xlarge
      - name: aggregation
      - name: streams_build_and_push
        distros:
          - amazon2023.3-c5-24xlarge
      - name: .streams_release_test
      - name: streams_suite_coverage_linter
      - name: generate_buildid_to_debug_symbols_mapping

  - name: enterprise-amazon2023-streams-arm64
    display_name: "Amazon Linux 2023 enterprise streams arm64"
    # TODO(SERVER-120347): Re-enable once we are ready to switch to using arm64.
    activate: false
    modules: ["asp-js-engine"]
    run_on:
      - amazon2023-arm64-latest-m8g-xlarge
    expansions:
      streams_exec_timeout_secs: 720
      test_flags: >-
        --excludeWithAnyTags=SERVER-34286,incompatible_with_amazon_linux,requires_external_data_source,requires_ldap_pool
        --additionalFeatureFlags=featureFlagStreams
      bazel_compile_flags: >-
        --define=MONGO_DISTMOD=amazon2023
        --streams_release_build=True
      release_rbe: true
      evergreen_remote_exec: on
      multiversion_platform: amazon2023
      multiversion_edition: enterprise-streams
      compile_variant: enterprise-amazon2023-streams-arm64
      large_distro_name: amazon2023.3-arm64-xxxlarge
      packager_distro: amazon2023
      packager_arch: aarch64
    display_tasks:
      - name: streams_tests
        execution_tasks:
          - streams_0
          - streams_1
          - streams_2
          - streams_3
          - streams_4
          - streams_5
          - streams_6
          - streams_7
          - streams_8
          - streams_9
      - name: streams_kafka_tests
        execution_tasks:
          - streams_kafka_0
          - streams_kafka_1
          - streams_kafka_2
          - streams_kafka_3
          - streams_kafka_4
          - streams_kafka_5
          - streams_kafka_6
          - streams_kafka_7
          - streams_kafka_8
          - streams_kafka_9
          - streams_kafka_10
          - streams_kafka_11
          - streams_kafka_gwproxy
          - streams_kafka_benchmark
      - name: streams_aspio_tests
        execution_tasks:
          - streams_aspio
          - streams_aspio_iceberg_0
          - streams_aspio_iceberg_1
          - streams_aspio_iceberg_2
          - streams_aspio_iceberg_3
          - streams_aspio_iceberg_4
          - streams_aspio_iceberg_large
          - streams_aspio_iceberg_5
          - streams_aspio_utilities
          - streams_aspio_pubsub
      - name: streams_s3_tests
        execution_tasks:
          - streams_s3_single
          - streams_s3_parallel
          - streams_s3_parallel_heavy
      - name: streams_azure_blob_tests
        execution_tasks:
          - streams_azure_blob_single
          - streams_azure_blob_parallel
          - streams_azure_blob_parallel_heavy
    tasks:
      - name: compile_and_archive_dist_test_TG
        distros:
          - amazon2023.3-arm64-xxxlarge
      - name: aggregation
      - name: streams_build_and_push
        distros:
          - amazon2023.3-arm64-xxxlarge
      - name: .streams_release_test
      - name: streams_suite_coverage_linter
      - name: generate_buildid_to_debug_symbols_mapping

