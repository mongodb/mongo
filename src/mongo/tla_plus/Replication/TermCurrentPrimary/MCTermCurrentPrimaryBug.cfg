\* Bug-mode configuration: the follower-side heartbeat path advances the
\* term without setting currentPrimaryIndex (the SERVER-125438 behaviour
\* before the fix). The safety invariant
\* PrimaryIndexConsistentWithTerm should be violated, demonstrating that
\* this spec catches the bug. To run:
\*
\*   cd src/mongo/tla_plus
\*   mv Replication/TermCurrentPrimary/MCTermCurrentPrimary.cfg \
\*      Replication/TermCurrentPrimary/MCTermCurrentPrimary.cfg.green
\*   cp Replication/TermCurrentPrimary/MCTermCurrentPrimaryBug.cfg \
\*      Replication/TermCurrentPrimary/MCTermCurrentPrimary.cfg
\*   ./model-check.sh Replication/TermCurrentPrimary
\*   # restore the green cfg afterwards

CONSTANT Server = {1, 2, 3}
CONSTANT Nil = 0
CONSTANT AtomicPrimaryUpdate = FALSE
CONSTANT MaxTerm = 3

INVARIANT PrimaryIndexConsistentWithTerm

CONSTRAINT StateConstraint
SPECIFICATION SpecBehavior
