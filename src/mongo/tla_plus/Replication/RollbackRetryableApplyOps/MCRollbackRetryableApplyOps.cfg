\* Config file for model-checking RollbackRetryableApplyOps.
\* Tracks SERVER-126373: rollback must identify atomic retryable applyOps as retryable.

SPECIFICATION Spec

CONSTANTS
Crud                     = Crud
AtomicApplyOpsRetryable  = AtomicApplyOpsRetryable
AtomicApplyOpsPlain      = AtomicApplyOpsPlain
NonAtomicApplyOps        = NonAtomicApplyOps
NoLsid                   = NoLsid

\* Logical session ids: two are enough to expose the classifier bug while
\* keeping the state space tiny under LsidSymmetry.
CONSTANT Lsids = {s1, s2}

\* Bound oplog length and number of rollbacks for finite model checking.
CONSTANT MaxLogLen    = 3
CONSTANT MaxRollbacks = 2

SYMMETRY   LsidSymmetry
CONSTRAINT StateConstraint

INVARIANT AtomicRetryableApplyOpsIdentified
INVARIANT ClassificationPartition
INVARIANT SessionTableReflectsRetryableEntries
INVARIANT NoSilentRetryableLoss
