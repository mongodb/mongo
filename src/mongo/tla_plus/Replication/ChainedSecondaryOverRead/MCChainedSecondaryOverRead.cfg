\* Config for the TLC model-checker on ChainedSecondaryOverRead.tla.
\* See ChainedSecondaryOverRead.tla for instructions.

CONSTANT MaxTerm = 2
CONSTANT MaxLogLen = 3

\* Three servers: one current primary, one chained secondary syncing through a
\* second secondary that will step up. Symmetry is broken by ServerSymmetry.
CONSTANT Server = {n1, n2, n3}

\* Flip to TRUE to reproduce SERVER-120205 (NoOverReadBeyondVisibility will be
\* violated). Leave FALSE to verify the fixed behavior.
CONSTANT BugChainedSecondaryOverRead = FALSE

INVARIANT NoOverReadBeyondVisibility
INVARIANT NoTwoPrimariesInSameTerm
INVARIANT WriteabilityImpliesLeader
INVARIANT VisibilityNeverExceedsLastApplied

SYMMETRY ServerSymmetry
CONSTRAINT StateConstraint
SPECIFICATION Spec
