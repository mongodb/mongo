\* Config file for model-checking MajorityAckUnderPartition.
\* See MajorityAckUnderPartition.tla for the bug specification
\* (SERVER-101041).

\* 3-node replica set: smallest size that admits Raft majorities.
CONSTANT Server   = {n0, n1, n2}

\* Single key "x" and two values mirroring the ticket scenario
\* ({x: 10} versus {x: 20}).
CONSTANT Key      = {x}
CONSTANT Value    = {v10, v20}

\* Two writes is enough: one legitimate majority commit on the new
\* primary, one no-op short-circuit on the stale isolated primary.
CONSTANT MaxWrites = 3

\* Symmetry over servers is unsound here because the bug is
\* asymmetric in role assignment, so we leave it off.

INVARIANT NoTwoPrimariesInSameTerm

\* The split-brain invariant. TLC should produce a counter-example
\* trace mirroring the SERVER-101041 scenario: legitimate w:majority
\* update of v20 on the new majority, plus no-op short-circuit ack of
\* v10 on the isolated stale primary.
INVARIANT NoSplitBrainAck

\* Quorum-intersection invariant. Also violated by the no-op
\* short-circuit (the lone isolated primary is not a quorum).
INVARIANT AckBackedByMajority

CONSTRAINT StateConstraint
SPECIFICATION Spec
