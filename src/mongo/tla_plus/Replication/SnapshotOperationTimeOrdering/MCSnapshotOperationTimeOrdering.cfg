\* Config file to run the TLC model-checker on
\* SnapshotOperationTimeOrdering.tla.
\* See SnapshotOperationTimeOrdering.tla for instructions.

\* Production-correct configuration (SERVER-120304 fix applied).
\* FetchOperationTime reads the per-thread snapshot timestamp captured at
\* AcquireSnapshot, modeling recoveryUnit->getLastUsedReadTimestamp() in the
\* fixed code. SnapshotMatchesOperationTime is expected to hold.
\*
\* To reproduce the pre-fix bug counterexample, flip UseLiveCommittedSnapshot
\* to TRUE and re-run. TLC reports a trace where AdvanceCommittedSnapshot
\* fires between AcquireSnapshot and FetchOperationTime for the same thread,
\* and SnapshotMatchesOperationTime is violated on SendResponse.
CONSTANT UseLiveCommittedSnapshot = FALSE

\* The maximum value the cluster clock may reach. Bounds the state space.
CONSTANT MaxClusterTime = 3

\* The set of client thread IDs running concurrent read commands.
CONSTANT Thread = {t1, t2}

\* Sentinel marker for "no timestamp captured yet".
CONSTANT NoTs = NoTs

INVARIANT TypeOK
INVARIANT ExecutedSnapshotBoundedByClock
INVARIANT SnapshotMatchesOperationTime

\* Not configurable.
SYMMETRY ThreadSymmetry
CONSTRAINT StateConstraint
SPECIFICATION Spec
