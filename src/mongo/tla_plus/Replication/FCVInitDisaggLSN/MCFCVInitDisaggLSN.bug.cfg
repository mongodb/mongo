\* Bug config for FCVInitDisaggLSN. AllowReturnBeforeConvergence = TRUE
\* enables ReturnEarly, modelling the SERVER-112445 regression: FCV-init
\* returns success while the disagg log-service LSN and the local stable
\* timestamp still disagree. BootstrapCoherence and ReturnTraceCoherence
\* are violated. TLC produces a short counterexample.
\*
\* Liveness checks are intentionally disabled here - safety is the headline.
\*
\* To run this config:
\*     cp Replication/FCVInitDisaggLSN/MCFCVInitDisaggLSN.bug.cfg \
\*        Replication/FCVInitDisaggLSN/MCFCVInitDisaggLSN.cfg
\*     ./model-check.sh Replication/FCVInitDisaggLSN

CONSTANT Server = {n1, n2}
CONSTANT MaxLocalWrites = 3
CONSTANT MaxLogServiceFlushes = 3
CONSTANT AllowReturnBeforeConvergence = TRUE

INVARIANT BootstrapCoherence
INVARIANT ReturnTraceCoherence

SYMMETRY ServerSymmetry
CONSTRAINT StateConstraint
SPECIFICATION SpecBehavior
