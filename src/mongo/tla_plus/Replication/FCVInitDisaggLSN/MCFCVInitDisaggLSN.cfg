\* Config file (green) for FCVInitDisaggLSN. See FCVInitDisaggLSN.tla for
\* instructions. AllowReturnBeforeConvergence = FALSE wires up the proposed
\* fix - init blocks in WaitConvergence until logServiceLSN and
\* localStableTS agree. All invariants and liveness properties hold.
\*
\* To exercise the bug, switch to MCFCVInitDisaggLSN.bug.cfg. There
\* BootstrapCoherence and ReturnTraceCoherence are violated by ReturnEarly.

CONSTANT Server = {n1, n2}
CONSTANT MaxLocalWrites = 3
CONSTANT MaxLogServiceFlushes = 3
CONSTANT AllowReturnBeforeConvergence = FALSE

INVARIANT BootstrapCoherence
INVARIANT ReturnTraceCoherence

PROPERTY LSNsMonotone
PROPERTY PhaseMonotone
PROPERTY FCVDocCommitFrozen
PROPERTY ConvergedReturnsMonotone

\* Liveness properties are gated off by default - SYMMETRY is unsound when
\* combined with liveness checking (TLC warns). To exercise liveness,
\* comment out SYMMETRY and uncomment the two lines below.
\* PROPERTY EventuallyCoherent
\* PROPERTY AllServersEventuallyReturn

SYMMETRY ServerSymmetry
CONSTRAINT StateConstraint
CHECK_DEADLOCK FALSE
SPECIFICATION Spec
