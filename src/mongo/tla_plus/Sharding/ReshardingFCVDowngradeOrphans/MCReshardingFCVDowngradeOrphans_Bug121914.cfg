\* Bug config for SERVER-121914. BugStaleChunks=TRUE — config.chunks entries for the
\* temp namespace are NOT cleared by the setFCV abort path. TLC must report a violation
\* of NoStaleConfigChunksAfterFCVDowngrade.

SPECIFICATION Spec

CONSTANTS
    Shards = {s1, s2}
    Namespaces = {n1}
    MaxOps = 6
    BugTempCollLeak = FALSE
    BugRangeDelLeak = FALSE
    BugStaleChunks  = TRUE

INVARIANT
    TypeOK
    NoStaleConfigChunksAfterFCVDowngrade

CONSTRAINT
    StateConstraint

SYMMETRY Symmetry
