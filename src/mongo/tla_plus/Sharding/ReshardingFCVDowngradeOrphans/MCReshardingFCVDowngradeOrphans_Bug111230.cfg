\* Bug config for SERVER-111230. BugTempCollLeak=TRUE — temp-collection metadata is
\* NOT cleared by the setFCV abort path. TLC must report a violation of
\* TempCollectionMetadataClearedOnFCVAbort.

SPECIFICATION Spec

CONSTANTS
    Shards = {s1, s2}
    Namespaces = {n1}
    MaxOps = 6
    BugTempCollLeak = TRUE
    BugRangeDelLeak = FALSE
    BugStaleChunks  = FALSE

INVARIANT
    TypeOK
    TempCollectionMetadataClearedOnFCVAbort

CONSTRAINT
    StateConstraint

SYMMETRY Symmetry
