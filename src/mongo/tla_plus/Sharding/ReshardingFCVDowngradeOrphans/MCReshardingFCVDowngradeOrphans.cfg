\* Green config: all bug toggles OFF. TLC should report no invariant violations.
\* CHECK_DEADLOCK is disabled because the model is naturally bounded (MaxOps caps
\* total operations) and the steady state — all reshards aborted/done, FCV settled
\* at lastLts — is a legitimate terminal absence of new actions, not a bug.

SPECIFICATION Spec

CONSTANTS
    Shards = {s1, s2}
    Namespaces = {n1}
    MaxOps = 6
    BugTempCollLeak = FALSE
    BugRangeDelLeak = FALSE
    BugStaleChunks  = FALSE

INVARIANT
    TypeOK
    TempCollectionMetadataClearedOnFCVAbort
    RangeDeletionsClearedOnReshardAbort
    NoStaleConfigChunksAfterFCVDowngrade
    IndexBuildDecisionFCVConsistent

CONSTRAINT
    StateConstraint

SYMMETRY Symmetry
