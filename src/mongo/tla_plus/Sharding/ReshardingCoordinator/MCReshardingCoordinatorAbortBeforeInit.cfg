\* Bug cfg: BugMode = TRUE encodes SERVER-115139 ("ReshardingDonorService cannot reliably handle
\* the case where _shardsvrAbortReshardCollection command comes in before the cancellation source
\* is initialized upon stepup recovery"). In this mode an abort that arrives in the
\* (Stepup, InitCancelSource) gap is silently dropped: abortRequested flips TRUE but no token
\* receives the cancellation, and no pendingAbort queue holds it for later.
\*
\* Expected TLC output: AbortAlwaysHandled is violated. The counterexample trace shows:
\*   1. Initial: coordinator + donor d1 are primary, all hasCancelSource = TRUE.
\*   2. Stepdown(d1)        -> primary[d1]=FALSE, hasCancelSource[d1]=FALSE.
\*   3. Stepup(d1)           -> primary[d1]=TRUE, hasCancelSource[d1]=FALSE  (the gap).
\*   4. AbortRequest(d1)     -> abortRequested=TRUE, BugMode drops it: abortObserved stays FALSE,
\*                              pendingAbort[d1] stays FALSE.
\*   5. InitCancelSource(d1) -> hasCancelSource[d1]=TRUE, pendingAbort[d1]=FALSE
\*                              (no queued abort to drain).
\*   At this state: abortRequested=TRUE, abortObserved=FALSE, all hasCancelSource=TRUE,
\*   no pendingAbort. AbortAlwaysHandled is violated.

SPECIFICATION Spec

CONSTANTS
    Coordinator = {c}
    Donors = {d1, d2}
    Recipients = {r1, r2}
    MaxStepdowns = 2
    BugMode = TRUE

INVARIANT
    TypeOK
    AbortAlwaysHandled
    NoCommitAfterAbort
    EveryStepupInitializesCancelSource
    CoordMonotoneOnSuccess
    ParticipantsRespectCoordinator
    StepdownDestroysCancelSource

CONSTRAINT
    StateBound

SYMMETRY Symmetry

CHECK_DEADLOCK
    FALSE
