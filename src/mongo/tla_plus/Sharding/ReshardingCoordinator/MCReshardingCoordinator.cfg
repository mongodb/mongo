\* Green cfg: BugMode = FALSE (the fixed implementation, where pendingAbort queues an early abort
\* until InitCancelSource consumes it). All invariants should pass.

SPECIFICATION Spec

CONSTANTS
    Coordinator = {c}
    Donors = {d1, d2}
    Recipients = {r1, r2}
    MaxStepdowns = 2
    BugMode = FALSE

INVARIANT
    TypeOK
    AbortAlwaysHandled
    NoCommitAfterAbort
    EveryStepupInitializesCancelSource
    CoordMonotoneOnSuccess
    ParticipantsRespectCoordinator
    StepdownDestroysCancelSource

CONSTRAINT
    StateBound

SYMMETRY Symmetry

CHECK_DEADLOCK
    FALSE
