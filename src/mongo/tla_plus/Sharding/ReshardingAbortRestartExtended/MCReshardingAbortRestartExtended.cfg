SPECIFICATION Spec

\* Terminal states (kCommitted, kCommittedAfterPrepare, kAbortedAfterPrepare,
\* kAbortedOnFirstStatement with no further retry budget, recDone) are intentional dead-ends.
CHECK_DEADLOCK FALSE

CONSTANTS
    Writes = {w1, w2}
    MaxRevivals = 2
    MaxRetryCounter = 2
    AllowResumeFromPrepared = FALSE
    AllowFirstStatementRetry = TRUE

INVARIANT
    TypeOK
    NoCommitWithLostWrites
    RecoveryPathDoesNotCrash
    FirstStatementRetryBumpsCounter
    PreparedAbortIsTerminal

PROPERTY
    CounterMonotonicity

CONSTRAINT
    ConstraintBoundedSubmitted
    ConstraintBoundedRejects
