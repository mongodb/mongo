SPECIFICATION Spec

\* Bug configuration: hypothetical defect symmetric to SERVER-85170's kAbortedWithoutPrepare
\* resume, applied to the kPrepared branch. A sub-router driving kStartOrContinue against a
\* kPrepared participant transitions it back to kInProgress at the same (txnNumber,
\* txnRetryCounter). TLC will produce a counterexample to NoCommitWithLostWrites within a
\* handful of states - the silent-data-loss shape generalised to the two-phase branch.
\*
\* FirstStatementRetryBumpsCounter and PreparedAbortIsTerminal also fall under this cfg.
\* NoCommitWithLostWrites is the headline (it is the generalised wave-2 invariant).

CHECK_DEADLOCK FALSE

CONSTANTS
    Writes = {w1, w2}
    MaxRevivals = 2
    MaxRetryCounter = 2
    AllowResumeFromPrepared = TRUE
    AllowFirstStatementRetry = TRUE

INVARIANT
    TypeOK
    NoCommitWithLostWrites

CONSTRAINT
    ConstraintBoundedSubmitted
    ConstraintBoundedRejects
