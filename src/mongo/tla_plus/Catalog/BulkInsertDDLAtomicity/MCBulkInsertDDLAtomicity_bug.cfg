\* Bug configuration: per-sub-batch lock scope -- the current production behavior described by
\* SERVER-95924. BulkInsertAtomicity should fail with a counterexample: a DDL fires between two
\* sub-batches of the same bulk and the two sub-batches record different incarnations. The
\* BaitDropToLiveSplit invariant, when enabled, also produces a witness for the rename-split shape
\* called out in the ticket (data partitioned across two collections).
\*
\* To run:
\*     cd src/mongo/tla_plus
\*     cp Catalog/BulkInsertDDLAtomicity/MCBulkInsertDDLAtomicity_bug.cfg \
\*        Catalog/BulkInsertDDLAtomicity/MCBulkInsertDDLAtomicity.cfg
\*     ./model-check.sh Catalog/BulkInsertDDLAtomicity
\* (Restore the green cfg afterwards.)

SPECIFICATION Spec

CONSTANTS
    Bulks = {b1, b2}
    SubBatches = 3
    DDLBudget = 3
    LOCK_SCOPE = "SUBBATCH"

INVARIANTS
    TypeOK
    ProgressMatchesLog
    \* -- The next two are EXPECTED TO FAIL under this configuration. They are the SERVER-95924
    \* -- atomicity invariants the wave-1 FSM jstest (SERVER-126543) demonstrates empirically.
    BulkInsertAtomicity
    NoDropIncarnationSplit
    LockMutualExclusion
    DoneBulkAllCommitted
    \* -- Bait invariants. Enable selectively to harvest example traces.
    \* BaitSubBatchIncarnationSplit
    \* BaitDropToLiveSplit
    \* BaitHappyPath

CONSTRAINTS
    StateConstraint

SYMMETRY Symmetry
