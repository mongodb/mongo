\* Green configuration: per-bulk lock scope. BulkInsertAtomicity holds for every bulk because
\* DDLs are excluded for the entire duration of the bulk. This is the proposed fix for
\* SERVER-95924. Run this cfg to verify the fix; expect TLC to find no invariant violations.

SPECIFICATION Spec

CONSTANTS
    Bulks = {b1, b2}
    SubBatches = 3
    DDLBudget = 3
    LOCK_SCOPE = "BULK"

INVARIANTS
    TypeOK
    ProgressMatchesLog
    BulkInsertAtomicity
    NoDropIncarnationSplit
    LockMutualExclusion
    DoneBulkAllCommitted
    \* -- Bait invariants. Enable selectively to harvest example traces.
    \* BaitSubBatchIncarnationSplit
    \* BaitDropToLiveSplit
    \* BaitHappyPath

CONSTRAINTS
    StateConstraint

SYMMETRY Symmetry
