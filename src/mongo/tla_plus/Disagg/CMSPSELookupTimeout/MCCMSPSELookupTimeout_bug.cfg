\* Bug-mode config: TimeoutEnabled = FALSE reproduces the pre-fix behaviour
\* described in SERVER-115352. The DeadlineExceeded action is structurally
\* disabled, so a slow peer parks the lookup at PhaseReading and the
\* liveness property LookupEventuallyTerminates is violated. TLC produces
\* a counter-example trace ending in an infinite TickWhileBlocked stutter.
\*
\* The safety invariants still hold under the bug config — the spec only
\* asserts negative claims about what *does* happen, not what *should*.

SPECIFICATION Spec

CONSTANTS
    Peers = {p1, p2}
    MaxRetries = 1
    AttemptBudget = 2
    TimeoutEnabled = FALSE

INVARIANT
    TypeOK
    StructuredErrorClassification
    MetricsAdvanceOnTimeoutOnly
    SuccessImpliesClean

PROPERTIES
    LookupEventuallyTerminates

CONSTRAINT
    StateConstraint

SYMMETRY Symmetry
