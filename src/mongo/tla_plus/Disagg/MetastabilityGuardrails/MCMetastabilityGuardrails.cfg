\* Healthy configuration. Guardrails on: load shedding, jittered backoff
\* (modeled as bounded retries with clock-tick non-determinism), and a
\* per-target circuit breaker. EventuallyReturnsToHealthy holds.

SPECIFICATION Spec

CONSTANTS
    Targets = {pageServer, appendLog, cms}
    QueueCapacity = 4
    HighWaterMark = 3
    MaxRetries = 2
    BreakerThreshold = 2
    BreakerCoolDown = 2
    MaxClock = 6
    GuardrailsEnabled = TRUE

CONSTRAINT
    StateConstraint

INVARIANT
    TypeOK
    QueueBounded
    NoDuplicateIds
    BreakerObserved

PROPERTY
    EventuallyReturnsToHealthy
    TriggerTransient
