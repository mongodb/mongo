\* Bug configuration. Guardrails OFF: no shed, retries effectively unbounded
\* (MaxRetries set high enough that the queue feeds itself), no breaker.
\* TLC reports a liveness counter-example on EventuallyReturnsToHealthy:
\* after TriggerCleared, queue depth stays > 0 forever. This is the
\* canonical metastable trace the design doc references.

SPECIFICATION Spec

CONSTANTS
    Targets = {pageServer, appendLog}
    QueueCapacity = 3
    HighWaterMark = 3
    MaxRetries = 99
    BreakerThreshold = 99
    BreakerCoolDown = 0
    MaxClock = 5
    GuardrailsEnabled = FALSE

CONSTRAINT
    StateConstraint

INVARIANT
    TypeOK
    QueueBounded
    NoDuplicateIds

PROPERTY
    EventuallyReturnsToHealthy
    TriggerTransient
