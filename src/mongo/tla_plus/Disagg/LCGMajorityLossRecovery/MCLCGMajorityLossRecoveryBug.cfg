\* Bug-mode model-check configuration for LCGMajorityLossRecovery.tla.
\* Skips the operator-attestation gate. TLC is expected to produce a
\* counter-example trace where the successor LCG diverges from the original
\* commit ledger:
\*
\*   1. predecessor LCG commits LSN 1 to a quorum
\*   2. only the survivors that did NOT receive LSN 1 stay up
\*   3. a snapshot containing LSN 1 lives on a now-lost node's object-store
\*      upload
\*   4. recovery skips attestation and forms a new LCG from the survivors
\*      without replaying that snapshot
\*   5. NoCommittedDataLoss fails: LSN 1 is no longer in any live log nor
\*      visible to any current LCG member's snapshot register
\*
\* Run with the standard model-check.sh wrapper after pointing it at this
\* config file (the wrapper looks for the default-named .cfg; swap manually
\* when reproducing the bug).

SPECIFICATION Spec

CONSTANTS
    Node = {n1, n2, n3, n4, n5}
    MaxLSN = 3
    MaxGeneration = 2
    RequireAttestation = FALSE

CONSTRAINT StateConstraint

SYMMETRY NodeSymmetry

INVARIANT
    TypeOK
    NoCommittedDataLoss
    MonotonicLSNFence
    QuorumLossWhileLost
