\* Config file to run the TLC model-checker on PageServerReaderStaleSorting.tla
\* with the PRODUCTION (buggy) sorting rule. A counter-example to
\* NoServingStaleReadFromLocal is expected: post step-up, with all remote
\* frontiers unknown, the local cell wins the sort and is picked despite
\* being unable to serve the requested LSN.
\* See PageServerReaderStaleSorting.tla for instructions.

SPECIFICATION Spec

CONSTANTS
    LocalCell       = c_local
    RemoteCells     = {c_r1, c_r2}
    MaxLSN          = 3
    MaxSteps        = 2
    SortingRule     = "PreferLocalUnconditional"

INVARIANT
    TypeOK
    NoServingStaleReadFromLocal

CONSTRAINT
    StateConstraint
