\* Config file to run the TLC model-checker on PageServerReaderStaleSorting.tla
\* with the FIX sorting rule. NoServingStaleReadFromLocal must hold.
\* See PageServerReaderStaleSorting.tla for instructions.

SPECIFICATION Spec

CONSTANTS
    LocalCell       = c_local
    RemoteCells     = {c_r1, c_r2}
    MaxLSN          = 3
    MaxSteps        = 4
    SortingRule     = "PreferKnownOverUnknown"

INVARIANT
    TypeOK
    NoServingStaleReadFromLocal

CONSTRAINT
    StateConstraint
