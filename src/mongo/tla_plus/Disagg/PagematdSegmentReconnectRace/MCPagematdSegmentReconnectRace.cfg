\* Model config for PagematdSegmentReconnectRace.
\*
\* Default configuration runs the BUG scenario: BugMode = TRUE. Under this configuration TLC
\* produces a liveness counterexample showing CMS registering a segment that pagematd never sees,
\* matching SERVER-126377 / BF-43088.
\*
\* To verify the fix, flip BugMode to FALSE and re-run. The liveness invariant
\* `EverySegmentEventuallySeen' should hold.

SPECIFICATION Spec

\* This spec has legitimate terminal states (reconnect budget exhausted, pagematd disconnected).
\* Liveness is the property of interest; turn off deadlock checking.
CHECK_DEADLOCK FALSE

CONSTANTS
    Segments       = {s1, s2}
    MaxReconnects  = 4
    BugMode        = TRUE

INVARIANT
    TypeOK
    TrackedSubsetOfCms
    KnownSubsetOfCms
    SubscriptionSubsetOfKnown

PROPERTIES
    EverySegmentEventuallySeen

\* Symmetry is intentionally NOT declared. TLC warns that symmetry can mask liveness violations,
\* and the spec's behavior space is small enough that exhaustive (asymmetric) exploration finishes
\* in well under a second on a laptop.
