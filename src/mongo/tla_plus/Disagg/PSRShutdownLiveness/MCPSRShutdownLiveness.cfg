\* Fix-path configuration: drain + structured cancel are enabled. All invariants and
\* liveness properties must hold. Run with:
\*   ./model-check.sh Disagg/PSRShutdownLiveness
SPECIFICATION Spec

CONSTANTS
    Requests = {r1, r2, r3}
    Workers = {w1, w2}
    EnableDrain = TRUE

CONSTRAINTS
    QueueLengthBound

INVARIANT
    TypeOK
    RequestStatesDisjoint
    WorkerBookkeepingOK
    WorkerUniqueAssignment
    NoOrphanedRequest
    ShutdownCompletesCleanly

PROPERTY
    EveryRequestResolved
    ShutdownTerminates
    AllWorkersEventuallyJoined
