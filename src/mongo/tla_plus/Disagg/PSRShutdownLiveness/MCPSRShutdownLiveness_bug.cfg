\* Bug-path configuration: EnableDrain = FALSE makes the spec take the
\* BugSkipDrainAndCancel shortcut from StopAccepting straight toward Joining without
\* draining the queue or sending structured ShutdownInProgress cancellations. TLC will
\* surface a short counter-example trace where requests sitting in `pending` or
\* `inFlight` end up stamped Orphaned, violating NoOrphanedRequest /
\* ShutdownCompletesCleanly. Use this cfg to reproduce the SERVER-113702 bug under
\* model checking:
\*   ./model-check.sh Disagg/PSRShutdownLiveness MCPSRShutdownLiveness_bug.cfg
\*
\* The expected TLC output is "Invariant NoOrphanedRequest is violated." followed by a
\* trace ending in phase = Joining (or Down) with at least one done[r] = Orphaned.
SPECIFICATION Spec

CONSTANTS
    Requests = {r1, r2, r3}
    Workers = {w1, w2}
    EnableDrain = FALSE

CONSTRAINTS
    QueueLengthBound

INVARIANT
    TypeOK
    RequestStatesDisjoint
    WorkerBookkeepingOK
    WorkerUniqueAssignment
    NoOrphanedRequest
    ShutdownCompletesCleanly
