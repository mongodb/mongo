\* TLC config for ResumeTokenArming.
\*
\* The default config below pins UseStartAt = FALSE. With this setting
\* the lazy-arming event-loss bug is reachable; TLC reports a
\* NoEventLoss invariant violation with a short counterexample.
\*
\* To verify the FIX, change UseStartAt to TRUE and re-run. TLC
\* completes the entire state-space exploration with no invariant
\* violation.

CONSTANTS
    MaxClock   = 4
    MaxEvents  = 2
    UseStartAt = FALSE

SPECIFICATION Spec

\* The model has natural terminal states (cursor closed, oplog full,
\* clock at cap). TLC reports these as deadlocks; suppress the alarm.
CHECK_DEADLOCK FALSE

INVARIANT TypeOK
INVARIANT OplogMonotone
INVARIANT NoEventLoss

CONSTRAINT StateConstraint
