\* Bug-mode TLC config for TTLEmissionOrdering: demonstrates that the spec
\* DETECTS the TTL-before-commit ordering violation when the bug knob is on.
\*
\* This is provided so a reviewer can run a single command and see TLC
\* produce a counterexample trace, confirming the safety invariants
\* are wired up correctly. Not part of the headline CI run.
\*
\* Run from src/mongo/tla_plus:
\*     cp ChangeStreams/TTLEmissionOrdering/MCTTLEmissionOrderingBug.cfg \
\*        ChangeStreams/TTLEmissionOrdering/MCTTLEmissionOrdering.cfg
\*     ./model-check.sh ChangeStreams/TTLEmissionOrdering
\* Then `git restore` the cfg to recover the green config.

SPECIFICATION Spec

CONSTANT Docs = {d1, d2}
CONSTANT MaxClock = 4
CONSTANT ExpireAfter = 1
CONSTANT ResumeToken = 0
CONSTANT ConsumerMatchSet = {d1, d2}

\* BUG KNOB ON: TTL monitor may target uncommitted (staged) docs.
\* This should make NoDeleteBeforeInsertInOplog and NoOrphanDelete fail.
CONSTANT AllowTTLBeforeCommit = TRUE
CONSTANT AllowOutOfOrderEmit = FALSE

CONSTRAINTS
    StateBound

INVARIANT
    TypeOK
    OplogMonotonic
    CausalOrdering
    NoOrphanDelete
    NoDeleteBeforeInsertInOplog

PROPERTY
    TTLNoSkip
    EventuallyDrained
