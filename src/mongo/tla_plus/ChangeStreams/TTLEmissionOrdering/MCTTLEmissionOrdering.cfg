\* TLC config for TTLEmissionOrdering.
\* See TTLEmissionOrdering.tla header for the modeled scenario.
\*
\* Run from src/mongo/tla_plus:
\*     ./model-check.sh ChangeStreams/TTLEmissionOrdering

SPECIFICATION Spec

\* The set of document identifiers a USER_WRITER may insert.
\* Two distinct docs is sufficient to exercise interleavings between
\* insert/commit/delete for one doc and similar actions on the other.
CONSTANT Docs = {d1, d2}

\* Upper bound on the abstract model clock. Combined with ExpireAfter,
\* this controls how many distinct TTL-eligibility transitions TLC sees.
CONSTANT MaxClock = 4

\* TTL expiry threshold. Setting ExpireAfter = 1 makes most docs expire
\* on the very next tick, maximizing the chance of TTL/insert interleavings.
CONSTANT ExpireAfter = 1

\* Change-stream resume token. Setting this > 0 exercises the case where
\* some early oplog events are below the consumer's view.
CONSTANT ResumeToken = 0

\* The consumer's $match admits both docs. Tighter match sets can be
\* explored in alternative model files.
CONSTANT ConsumerMatchSet = {d1, d2}

\* Correctness configuration: both bug knobs off. The headline run.
\* To explore bug modes, set either of these to TRUE and the corresponding
\* invariant will fail with a counterexample trace.
CONSTANT AllowTTLBeforeCommit = FALSE
CONSTANT AllowOutOfOrderEmit = FALSE

CONSTRAINTS
    StateBound

INVARIANT
    TypeOK
    OplogMonotonic
    CausalOrdering
    NoOrphanDelete
    NoDeleteBeforeInsertInOplog
    \* BaitDeleteObserved   -- uncomment to confirm reachability of delete observations.
    \* BaitNoTTLDelete      -- uncomment to confirm TTL monitor actually runs.

PROPERTY
    TTLNoSkip
    EventuallyDrained
